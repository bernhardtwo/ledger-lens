services:
  postgres:
    image: postgres:16-alpine
    container_name: ledgerlens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ledgerlens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ledgerlens}
      POSTGRES_DB: ${POSTGRES_DB:-ledgerlens}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ledgerlens}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:4
    container_name: ledgerlens-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
