name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Integration tests spin up a disposable Postgres via testcontainers;
      # GitHub Actions ubuntu runners have Docker available out of the box.
      - name: Integration tests
        run: pnpm test:integration

      # The Phase 5 "eval gate" deliberately lives in a SEPARATE workflow
      # (eval.yml, manual + weekly), not here: it runs the real agent and spends
      # API tokens, so it must not run on every push/PR. These per-commit gates
      # stay deterministic, Docker-only and offline.
